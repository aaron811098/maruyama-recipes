<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00833e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="丸山手順">
  <link rel="icon" href="app-icon.png">
  <link rel="apple-touch-icon" href="app-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="employee.css">
  <title>7-ELEVEN 丸山門市｜員工專用手順</title>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div>
        <div class="eyebrow">7-ELEVEN 丸山門市</div>
        <h1>員工專用手順</h1>
      </div>
      <div class="header-actions">
        <button id="searchToggle" class="round-button" type="button" aria-label="開啟搜尋">⌕</button>
      </div>
    </header>
    <div class="brand-stripes"></div>
    <main>
      <h2>手順查詢</h2>
      <form id="searchForm" class="search-form" hidden>
        <input id="searchInput" placeholder="搜尋飲品名稱" autocomplete="off">
        <button type="submit" aria-label="搜尋">⌕</button>
      </form>
      <div id="status" class="status" hidden></div>
      <nav id="categoryNav" class="chip-row" aria-label="手順分類"></nav>
      <nav id="drinkNav" class="chip-row drink-row" aria-label="飲品品項"></nav>
      <section id="recipePanel" class="recipe-panel" hidden></section>
    </main>
  </div>

  <div id="searchDialog" class="dialog-layer" hidden>
    <button class="dialog-backdrop" data-close aria-label="關閉"></button>
    <section class="dialog-card search-results" role="dialog" aria-modal="true">
      <div class="dialog-title-row"><h2>請選擇手順</h2><button data-close class="icon-close">×</button></div>
      <div id="searchResults"></div>
    </section>
  </div>

  <div id="noteDialog" class="dialog-layer" hidden>
    <button class="dialog-backdrop" data-note-close aria-label="關閉"></button>
    <section class="dialog-card note-dialog" role="alertdialog" aria-modal="true">
      <div class="warning-icon">!</div>
      <h2>注意事項</h2>
      <div id="noteDialogText"></div>
      <button data-note-close class="primary-button">我知道了</button>
    </section>
  </div>

  <script type="module" src="employee.js"></script>
</body>
</html>
