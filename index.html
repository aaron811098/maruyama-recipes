<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>7-ELEVEN 丸山門市｜員工專用手順</title><style>
:root{--g:#00833e;--o:#f58220;--r:#e51b2b;--ink:#202020;--line:#d9dfdb;--bg:#f7f8f6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;font-size:20px;line-height:1.55}.app{max-width:760px;margin:auto;min-height:100vh;background:#fff}.head{padding:28px 24px 20px}.eyebrow{color:var(--g);font-weight:800;letter-spacing:.04em}.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.title-row h1{font-size:clamp(38px,9vw,60px);line-height:1.15;margin:10px 0}.search-open,.search button{border:0;background:var(--g);color:#fff;border-radius:50%;width:64px;height:64px;font-size:30px}.stripes{height:15px;background:linear-gradient(to bottom,var(--o) 0 25%,#fff 25% 35%,var(--g) 35% 60%,#fff 60% 70%,var(--r) 70% 95%,#fff 95%)}main{padding:24px}.section-title{color:var(--g);font-size:28px;margin:0 0 14px}.search{display:flex;border:2px solid #cfd5d1;border-radius:18px;overflow:hidden;margin-bottom:20px}.search input{min-width:0;flex:1;border:0;padding:17px 20px;font:inherit;font-size:22px}.search button{border-radius:0}.scroller{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:thin}.pill{white-space:nowrap;border:2px solid var(--g);background:#fff;border-radius:22px;padding:12px 20px;font-size:19px;font-weight:700;min-height:52px}.pill.active{background:var(--g);color:#fff}.items .pill{border-color:var(--o)}.items .pill.active{background:var(--o);color:#fff}.card{margin-top:18px;border:1px solid #dfe7e2;border-radius:26px;padding:26px 20px 20px;box-shadow:0 8px 24px #006b2f18}.card h2{color:var(--g);font-size:42px;line-height:1.2;margin:0 0 18px}.toggle{display:grid;grid-template-columns:1fr 1fr;border:2px solid #d6ddd8;border-radius:999px;overflow:hidden;margin:12px 0}.toggle button{border:0;background:#fff;padding:14px;font-size:23px;font-weight:800}.toggle button.active{color:var(--g);background:#edf8f1;box-shadow:inset 0 0 0 2px var(--g);border-radius:999px}.meta{display:flex;gap:10px;flex-wrap:wrap}.tag{padding:8px 14px;border-radius:12px;background:#edf8f1;font-weight:700}.tag:nth-child(2){background:#fff1df}.tag:nth-child(3){background:#eaf5fb}.card h3{font-size:30px;margin:26px 0 14px;border-bottom:2px solid #7bac91;padding-bottom:8px}.ingredients{font-size:22px;padding-left:26px}.ingredients li{margin:10px 0}.steps{list-style:none;padding:0;margin:0;counter-reset:s}.steps li{counter-increment:s;display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #e0e4e1;border-radius:18px;padding:17px 16px;margin:12px 0;font-size:clamp(24px,6vw,30px);font-weight:800;box-shadow:0 3px 10px #0000000b}.steps li:before{content:counter(s);flex:0 0 60px;height:60px;border-radius:50%;display:grid;place-items:center;background:var(--g);color:#fff;font-size:32px}.empty{padding:30px;text-align:center;color:#666}@media(max-width:420px){main{padding:18px}.head{padding:22px 18px}.card{padding:22px 14px}.pill{padding:11px 16px}}
</style></head><body><div class="app"><header class="head"><div class="eyebrow">7-ELEVEN 丸山門市</div><div class="title-row"><h1>員工專用手順</h1><button class="search-open" aria-label="前往搜尋">⌕</button></div></header><div class="stripes"></div><main><h2 class="section-title">手順查詢</h2><form class="search"><input id="q" placeholder="搜尋飲品名稱" aria-label="搜尋飲品名稱"><button aria-label="搜尋">⌕</button></form><nav id="cats" class="scroller"></nav><nav id="items" class="scroller items"></nav><article id="recipe" class="card"></article></main></div><script>
const D={
'CITY CAFE':{

'檸檬氣泡咖啡':{'特大杯・冰':['特大杯','大冰','檸檬糖漿','氣泡水','冰沙']},'檸檬咖啡':{'特大杯・冰':['特大杯','大冰','檸檬糖漿','大冰美','冰塊補滿']},'芭樂氣泡咖啡':{'特大杯・冰':['特大杯','大冰','芭樂糖漿（微波 1）','氣泡水','冰沙']},'爆米花拿鐵':{'中杯・熱':['中杯','爆米花（微波 6）','冰沙','攪拌'],'大杯・冰':['大杯','爆米花','冰沙','大冰']},
'紅茶拿鐵':{'中杯・熱':['中杯','紅茶粉包','熱水','攪拌','熱牛奶'],'大杯・冰':['大杯','紅茶粉包','熱牛奶','攪拌','藍冰','冰牛奶補滿']},'抹茶拿鐵':{'中杯・熱':['中杯','抹茶粉包','熱水','攪拌','熱牛奶'],'大杯・冰':['大杯','抹茶粉包','熱牛奶','攪拌','藍冰','冰牛奶補滿']},'焙茶拿鐵':{'中杯・熱':['中杯','焙茶粉包','熱水','攪拌','熱牛奶'],'大杯・冰':['大杯','焙茶粉包','熱牛奶','攪拌','藍冰','冰牛奶補滿']},'好時可可':{'中杯・熱':['中杯','可可粉包','熱水','攪拌','熱牛奶'],'大杯・冰':['大杯','可可粉包','熱牛奶','攪拌','藍冰','冰牛奶補滿']},'香草焦糖瑪奇朵':{'中杯・熱':['中杯','中熱拿','焦糖糖漿','攪拌'],'大杯・冰':['大杯','大冰拿','焦糖糖漿','大冰']},'榛果太妃拿鐵':{'中杯・熱':['中杯','中熱拿','榛果糖漿','攪拌'],'大杯・冰':['大杯','大冰拿','榛果糖漿','大冰']},'榛果燕麥拿鐵':{'大杯・冰':['大杯','大冰','榛果糖漿','冰沙','燕麥奶']}},
'CITY PRIMA':{'精品濃醇摩卡':{'大杯・冰':['大杯','可可粉包','熱牛奶 150cc','攪拌','藍冰','精品濃縮 30cc','冰牛奶補至 9 分滿','另附約翰走路威士忌小瓶']},'精品香椰厚拿鐵':{'中杯・冰':['中杯','中冰','椰奶','精品濃縮 30cc']},'精品燕麥拿鐵':{'中杯・冰':['中杯','中冰','精品濃縮 30cc','燕麥奶']},'精品黑醋栗美式':{'大杯・冰':['大杯','黑醋栗冰磚','中冰','精品中冰美']}},
'CITY PEARL':{'蜜梅心動冰沙':{'大杯・冰':['大杯','蜜梅冰沙（微波 5）','茉莉茶凍']},'統一布丁冰沙':{'大杯・冰':['大杯','布丁冰沙（微波 4）','統一小布丁']},'杏仁豆腐冰沙':{'大杯・冰':['大杯','杏仁冰沙（微波 6）','杏仁豆腐']},'鳳梨冰沙':{'大杯・冰':['大杯','鳳梨冰沙（微波 6）']},'黑糖粉粿蕎麥茶':{'特大杯・冰':['特大杯','特大冰','蕎麥茶','黑糖粉粿（先捏碎）','冰塊補滿']},'黑糖珍珠撞奶':{'大杯・冰':['大杯','大冰','黑糖珍珠','冰牛奶補滿']},'咖啡珍珠歐蕾':{'大杯・冰':['大杯','大冰','黑糖珍珠','冰沙','冰牛奶補滿']},'珍珠奶茶':{'特大杯・冰':['特大杯','珍奶粉包','熱水','攪拌','原味珍珠','冰塊補滿']},'黑金燒仙草':{'大杯・熱':['大杯','燒仙草（微波 6）','熱水補滿','攪拌','附黑色湯匙']}},
'CITY TEA':{'蕎麥奶茶':{'大杯・熱':['大杯','蕎麥茶','熱牛奶','熱水補滿','攪拌'],'特大杯・冰':['特大杯','特大冰','蕎麥茶','冰牛奶','冰塊補滿']},'蕎麥茶':{'大杯・熱':['大杯','蕎麥茶','熱水補滿','攪拌'],'特大杯・冰':['特大杯','特大冰','蕎麥茶','冰塊補滿']},'青茶':{'大杯・熱':['大杯','熱青茶按鍵','依甜度加專用砂糖','攪拌'],'特大杯・冰':['特大杯','依甜度加專用砂糖','冰青茶按鍵','攪拌','冰塊補滿']},'紅茶':{'大杯・熱':['大杯','熱紅茶按鍵','依甜度加專用砂糖','攪拌'],'特大杯・冰':['特大杯','依甜度加專用砂糖','冰紅茶按鍵','攪拌','冰塊補滿']},'奶青':{'大杯・熱':['大杯','熱奶青按鍵','熱牛奶 150cc','依甜度加專用砂糖','攪拌'],'特大杯・冰':['特大杯','依甜度加專用砂糖','冰奶青按鍵','攪拌','冰牛奶 140cc','冰塊補滿']},'奶茶':{'大杯・熱':['大杯','熱奶茶按鍵','熱牛奶 150cc','依甜度加專用砂糖','攪拌'],'特大杯・冰':['特大杯','依甜度加專用砂糖','冰奶茶按鍵','攪拌','冰牛奶 140cc','冰塊補滿']},'冰淇淋紅茶':{'特大杯・冰':['特大杯','冰淇淋紅茶按鍵','依甜度加專用砂糖','攪拌','大冰','業務用冰淇淋']},'水果茶':{'特大杯・冰':['特大杯','冰青茶＋糖漿按鍵','水果糖漿','攪拌','冰塊補滿']},'青梅冰茶':{'特大杯・冰':['特大杯','冰青茶＋糖漿按鍵','青梅糖漿','攪拌','冰塊補滿']},'檸檬青茶':{'特大杯・冰':['特大杯','冰青茶＋糖漿按鍵','檸檬糖漿','攪拌','冰塊補滿']},'檸檬紅茶':{'特大杯・冰':['特大杯','冰紅茶＋糖漿按鍵','檸檬糖漿','攪拌','冰塊補滿']}}
};let cat='CITY CAFE',drink='燕麥拿鐵',variant='中杯・冰';const $=s=>document.querySelector(s);function btn(t,a,c){return `<button class="pill ${a?'active':''}" data-v="${t}">${t}</button>`}function render(){cats.innerHTML=Object.keys(D).map(x=>btn(x,x===cat)).join('');items.innerHTML=Object.keys(D[cat]).map(x=>btn(x,x===drink)).join('');let V=D[cat][drink],keys=Object.keys(V);if(!V[variant])variant=keys[0];let p=variant.split('・'),steps=V[variant];recipe.innerHTML=`<h2>${drink}</h2><div class="meta"><span class="tag">${cat}</span><span class="tag">${p[0]}</span><span class="tag">${p[1]||''}</span></div>${keys.length>1?`<div class="toggle">${keys.map(k=>`<button class="${k===variant?'active':''}" data-var="${k}">${k}</button>`).join('')}</div>`:''}<h3>材料</h3><ul class="ingredients">${steps.map(x=>`<li>${x}</li>`).join('')}</ul><h3>製作步驟</h3><ol class="steps">${steps.map(x=>`<li>${x}</li>`).join('')}</ol>`;bind()}function bind(){cats.querySelectorAll('button').forEach(b=>b.onclick=()=>{cat=b.dataset.v;drink=Object.keys(D[cat])[0];variant=Object.keys(D[cat][drink])[0];render()});items.querySelectorAll('button').forEach(b=>b.onclick=()=>{drink=b.dataset.v;variant=Object.keys(D[cat][drink])[0];render()});recipe.querySelectorAll('[data-var]').forEach(b=>b.onclick=()=>{variant=b.dataset.var;render()})}$('.search').onsubmit=e=>e.preventDefault();q.oninput=()=>{let s=q.value.trim();if(!s)return render();for(let c in D)for(let d in D[c])if(d.includes(s)){cat=c;drink=d;variant=Object.keys(D[c][d])[0];return render()}recipe.innerHTML='<div class="empty">找不到食譜，請換個關鍵字</div>'};render();
</script><style>.search[hidden]{display:none}</style><script>
const searchForm=document.querySelector('.search');
searchForm.hidden=true;
document.querySelector('.search-open').onclick=()=>{const opening=searchForm.hidden;searchForm.hidden=!opening;q.value='';closeChooser();if(opening)q.focus()};
const removeIngredients=()=>{const list=document.querySelector('.ingredients');if(list){const heading=list.previousElementSibling;list.remove();if(heading)heading.remove()}const stepHeading=document.querySelector('.card h3');if(stepHeading)stepHeading.textContent='製作手順'};
new MutationObserver(removeIngredients).observe(document.querySelector('#recipe'),{childList:true});
removeIngredients();
// Correct the PDF category grouping and complete hot/cold variants.
D['CITY PEARL']['蕎麥奶茶']=D['CITY TEA']['蕎麥奶茶'];
D['CITY PEARL']['蕎麥茶']=D['CITY TEA']['蕎麥茶'];
delete D['CITY TEA']['蕎麥奶茶'];
delete D['CITY TEA']['蕎麥茶'];
D['CITY PEARL']['黑糖珍珠撞奶']['大杯・熱']=['大杯','熱水','黑糖珍珠','熱牛奶補滿'];
D['CITY PEARL']['咖啡珍珠歐蕾']['大杯・熱']=['大杯','熱水','黑糖珍珠','冰沙','熱牛奶補滿'];
D['CITY PEARL']['珍珠奶茶']['大杯・熱']=['大杯','珍奶粉包','熱水','攪拌','原味珍珠','熱水補滿'];
render();
// Search result chooser: show a selection window only when multiple recipes match.
const chooser=document.createElement('div');
chooser.className='search-chooser';
chooser.hidden=true;
chooser.innerHTML='<div class="chooser-backdrop"></div><section class="chooser-panel" role="dialog" aria-modal="true" aria-labelledby="chooser-title"><div class="chooser-head"><h2 id="chooser-title">請選擇手順</h2><button type="button" class="chooser-close" aria-label="關閉">×</button></div><div class="chooser-list"></div></section>';
document.body.appendChild(chooser);
const closeChooser=()=>{chooser.hidden=true};
chooser.querySelector('.chooser-close').onclick=closeChooser;
chooser.querySelector('.chooser-backdrop').onclick=closeChooser;
const selectRecipe=(c,d)=>{cat=c;drink=d;variant=Object.keys(D[c][d])[0];closeChooser();render()};
const runSearch=()=>{
  const keyword=q.value.trim().toLowerCase();
  closeChooser();
  if(!keyword)return;
  const matches=[];
  for(const c in D)for(const d in D[c])if(d.toLowerCase().includes(keyword))matches.push({c,d});
  if(matches.length===1){selectRecipe(matches[0].c,matches[0].d);return}
  if(matches.length>1){
    chooser.querySelector('.chooser-list').innerHTML=matches.map((m,i)=>`<button type="button" data-i="${i}"><strong>${m.d}</strong><span>${m.c}</span></button>`).join('');
    chooser.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{const m=matches[Number(b.dataset.i)];selectRecipe(m.c,m.d)});
    chooser.hidden=false;
    return;
  }
  recipe.innerHTML='<div class="empty">找不到手順，請換個關鍵字</div>';
};
q.oninput=runSearch;
searchForm.onsubmit=e=>{e.preventDefault();runSearch()};
</script><style>
.search-chooser[hidden]{display:none}.search-chooser{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center}.chooser-backdrop{position:absolute;inset:0;background:#0008}.chooser-panel{position:relative;width:min(100%,760px);max-height:78vh;overflow:auto;background:#fff;border-radius:28px 28px 0 0;padding:22px 18px 28px;box-shadow:0 -8px 30px #0003}.chooser-head{display:flex;align-items:center;justify-content:space-between;border-bottom:5px solid var(--g);margin-bottom:12px}.chooser-head h2{margin:0 0 12px;color:var(--g);font-size:30px}.chooser-close{width:54px;height:54px;border:0;border-radius:50%;background:#eee;font-size:38px;line-height:1}.chooser-list{display:grid;gap:12px}.chooser-list button{display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%;min-height:72px;padding:15px 18px;border:2px solid #dce5df;border-radius:16px;background:#fff;color:var(--ink);text-align:left;font-size:24px}.chooser-list button:active{background:#edf8f1;border-color:var(--g)}.chooser-list span{flex:none;color:var(--g);font-size:17px;font-weight:800}
</style></body></html>
