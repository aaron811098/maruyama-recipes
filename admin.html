<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>丸山手順管理</title><style>
:root{--g:#00833e;--o:#f58220;--r:#d71920;--bg:#f5f7f5;--ink:#202420}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);font-size:18px}header{background:#fff;padding:20px;border-bottom:8px solid var(--g)}header h1{margin:0;color:var(--g)}main{max-width:1100px;margin:auto;padding:20px}.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:18px;box-shadow:0 3px 16px #0001}.hidden{display:none!important}label{display:grid;gap:6px;font-weight:700;margin:12px 0}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:12px;border:2px solid #ccd5cf;border-radius:10px}textarea{min-height:180px}button{border:0;border-radius:10px;padding:12px 18px;font-weight:800;cursor:pointer}.primary{background:var(--g);color:#fff}.orange{background:var(--o);color:#fff}.danger{background:var(--r);color:#fff}.muted{background:#e7ebe8}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.list{display:grid;gap:10px;margin-top:14px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:2px solid #e5eae7;border-radius:12px;padding:12px}.row small{display:block;color:#627067}.message{padding:12px;border-radius:10px;background:#fff3cd;margin:10px 0}.steps-help{font-size:15px;color:#68736c}.account-input{display:flex;align-items:stretch}.account-input input{min-width:0;border-radius:10px 0 0 10px}.account-input span{display:flex;align-items:center;padding:0 14px;border:2px solid #ccd5cf;border-left:0;border-radius:0 10px 10px 0;background:#edf2ee;color:#365141;font-weight:800}@media(max-width:760px){.grid{grid-template-columns:1fr}.row{align-items:flex-start;flex-direction:column}.account-input span{padding:0 9px;font-size:15px}}
</style></head><body><header><h1>丸山門市｜手順管理</h1></header><main>
<section id="login" class="card"><h2>管理員登入</h2><form id="loginForm"><label>帳號<div class="account-input"><input id="username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required><span>@maruyama.local</span></div></label><label>密碼<input id="password" type="password" autocomplete="current-password" required></label><button class="primary">登入</button></form><div id="loginMsg"></div></section>
<div id="app" class="hidden"><section class="card toolbar"><strong id="who"></strong><button id="logout" class="muted">登出</button><button id="addCategory" class="orange">新增分類</button></section><div class="grid"><section class="card"><h2>手順清單</h2><label>分類<select id="filterCategory"></select></label><button id="newRecipe" class="primary">新增手順</button><div id="recipeList" class="list"></div></section><section class="card"><h2 id="editorTitle">新增手順</h2><form id="editor"><input id="variantId" type="hidden"><input id="drinkId" type="hidden"><label>分類<select id="categoryId" required></select></label><label>飲品名稱<input id="drinkName" required></label><div class="grid"><label>杯型／尺寸<input id="size" placeholder="例：大杯" required></label><label>冷熱<select id="temperature"><option>冰</option><option>熱</option><option>常溫</option></select></label></div><label>製作手順<textarea id="steps" placeholder="每行一個步驟" required></textarea><span class="steps-help">每一行會成為一個編號步驟。</span></label><label>注意事項<textarea id="note" placeholder="可留空"></textarea></label><label><span><input id="active" type="checkbox" checked style="width:auto"> 啟用</span></label><div class="toolbar"><button class="primary">儲存</button><button id="deleteRecipe" type="button" class="danger hidden">刪除</button></div></form><div id="editMsg"></div></section></div></div>
</main><script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import {SUPABASE_URL,SUPABASE_ANON_KEY} from './config.js';
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const $=id=>document.getElementById(id);let categories=[],entries=[];
const msg=(el,text,bad=false)=>{el.innerHTML=text?`<div class="message" style="${bad?'background:#f8d7da':''}">${text}</div>`:''};
async function requireAdmin(){const {data:{user}}=await sb.auth.getUser();if(!user)return false;const {data}=await sb.from('profiles').select('role').eq('user_id',user.id).single();if(data?.role!=='admin'){await sb.auth.signOut();throw new Error('此帳號沒有管理員權限')}$('who').textContent=user.email;return true}
async function load(){let c=await sb.from('categories').select('*').order('sort_order');if(c.error)throw c.error;categories=c.data;let v=await sb.from('recipe_variants').select('*,drinks!inner(id,name,category_id,categories!inner(name))').order('sort_order');if(v.error)throw v.error;entries=v.data;render()}
function render(){const opts=categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');$('categoryId').innerHTML=opts;$('filterCategory').innerHTML='<option value="">全部分類</option>'+opts;renderList()}
function renderList(){const f=$('filterCategory').value;$('recipeList').innerHTML=entries.filter(x=>!f||x.drinks.category_id===f).map(x=>`<div class="row"><div><strong>${x.drinks.name}</strong><small>${x.drinks.categories.name}｜${x.size}・${x.temperature}${x.is_active?'':'｜已停用'}</small></div><button class="muted" data-edit="${x.id}">編輯</button></div>`).join('')||'<p>尚無資料</p>';$('recipeList').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(b.dataset.edit))}
function reset(){editor.reset();$('variantId').value='';$('drinkId').value='';$('active').checked=true;$('editorTitle').textContent='新增手順';$('deleteRecipe').classList.add('hidden');msg($('editMsg'),'')}
function edit(id){const x=entries.find(e=>e.id===id);$('variantId').value=x.id;$('drinkId').value=x.drinks.id;$('categoryId').value=x.drinks.category_id;$('drinkName').value=x.drinks.name;$('size').value=x.size;$('temperature').value=x.temperature;$('steps').value=x.steps.join('\n');$('note').value=x.note||'';$('active').checked=x.is_active;$('editorTitle').textContent='修改手順';$('deleteRecipe').classList.remove('hidden');scrollTo({top:0,behavior:'smooth'})}
$('loginForm').onsubmit=async e=>{e.preventDefault();msg($('loginMsg'),'登入中…');const username=$('username').value.trim().toLowerCase();const email=`${username}@maruyama.local`;const {error}=await sb.auth.signInWithPassword({email,password:$('password').value});if(error)return msg($('loginMsg'),'帳號或密碼錯誤',true);try{await requireAdmin();$('login').classList.add('hidden');$('app').classList.remove('hidden');await load()}catch(err){msg($('loginMsg'),err.message,true)}};
$('logout').onclick=async()=>{await sb.auth.signOut();location.reload()};$('filterCategory').onchange=renderList;$('newRecipe').onclick=reset;
$('addCategory').onclick=async()=>{const name=prompt('分類名稱');if(!name)return;const code=prompt('分類代碼',name);if(!code)return;const {error}=await sb.from('categories').insert({name,code});if(error)alert(error.message);else await load()};
$('editor').onsubmit=async e=>{e.preventDefault();msg($('editMsg'),'儲存中…');try{let did=$('drinkId').value;const drink={category_id:$('categoryId').value,name:$('drinkName').value.trim()};if(did){const {error}=await sb.from('drinks').update(drink).eq('id',did);if(error)throw error}else{const found=await sb.from('drinks').select('id').eq('category_id',drink.category_id).eq('name',drink.name).maybeSingle();if(found.error)throw found.error;if(found.data)did=found.data.id;else{const {data,error}=await sb.from('drinks').insert(drink).select().single();if(error)throw error;did=data.id}}const variant={drink_id:did,size:$('size').value.trim(),temperature:$('temperature').value,steps:$('steps').value.split('\n').map(s=>s.trim()).filter(Boolean),note:$('note').value.trim()||null,is_active:$('active').checked};const id=$('variantId').value;const q=id?sb.from('recipe_variants').update(variant).eq('id',id):sb.from('recipe_variants').insert(variant);const {error}=await q;if(error)throw error;await load();reset();msg($('editMsg'),'已儲存')}catch(err){msg($('editMsg'),err.message,true)}};
$('deleteRecipe').onclick=async()=>{if(!confirm('確定刪除這筆手順？'))return;const id=$('variantId').value,did=$('drinkId').value;const {error}=await sb.from('recipe_variants').delete().eq('id',id);if(error)return msg($('editMsg'),error.message,true);const remaining=await sb.from('recipe_variants').select('*',{count:'exact',head:true}).eq('drink_id',did);if(!remaining.error&&remaining.count===0)await sb.from('drinks').delete().eq('id',did);await load();reset()};
try{if(await requireAdmin()){$('login').classList.add('hidden');$('app').classList.remove('hidden');await load()}}catch(e){msg($('loginMsg'),e.message,true)}
</script></body></html>
