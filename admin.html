<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00833e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="手順管理">
  <link rel="icon" href="app-icon.png?v=20260622">
  <link rel="apple-touch-icon" href="app-icon.png?v=20260622">
  <link rel="manifest" href="admin.webmanifest?v=20260622">
  <link rel="stylesheet" href="admin.css">
  <title>丸山門市｜手順管理</title>
</head>
<body>
  <section id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <h1>手順管理登入</h1>
      <label>帳號<div class="account-field"><input id="username" autocomplete="username" required><span>@maruyama.local</span></div></label>
      <label>密碼<input id="password" type="password" autocomplete="current-password" required></label>
      <button class="primary-button">登入</button>
      <a class="login-employee-link" href="index.html">前往員工頁</a>
      <div id="loginMessage" class="message" hidden></div>
    </form>
  </section>

  <div id="adminApp" class="admin-app" hidden>
    <header class="admin-header">
      <strong>丸山門市｜手順管理</strong>
      <div><span id="currentUser">266871</span><a id="employeeLink" href="index.html">員工頁</a><button id="logoutButton">登出</button></div>
    </header>
    <div class="brand-stripes"></div>
    <main id="adminMain"></main>
    <nav class="bottom-nav">
      <button data-page="add"><span>▣＋</span>新增</button>
      <button data-page="edit"><span>✎</span>修改</button>
      <button data-page="sort"><span>☷</span>排序管理</button>
    </nav>
  </div>

  <div id="confirmDialog" class="dialog-layer" hidden>
    <button class="dialog-backdrop" data-confirm-cancel aria-label="關閉"></button>
    <section class="dialog-card" role="alertdialog" aria-modal="true">
      <div id="confirmIcon" class="warning-icon">!</div>
      <h2 id="confirmTitle"></h2>
      <p id="confirmMessage"></p>
      <div class="dialog-actions"><button data-confirm-cancel class="outline-button">取消</button><button id="confirmAccept" class="danger-button">確定</button></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
